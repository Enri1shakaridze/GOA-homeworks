<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="all-cont">
        <div class="cont">
            <div class="cont1">
                <h1>Stay updated!</h1>
                <p id="maxp">Join 60,000+ product managers receiving monthly <br> updates on:</p>
                <div class="marker1">
                    <img src="../assets/images/icon-list.svg" alt="">
                    <p id="inline">Product discovery and building what matters</p>
                </div>
                <div class="marker2">
                    <img src="../assets/images/icon-list.svg" alt="">
                    <p id="inline">Measuring to ensure updates are a success</p>
                </div>
                <div class="marker3">
                    <img src="../assets/images/icon-list.svg" alt="">
                    <p id="inline">And much more!</p>
                </div>
                <div class="inpform">
                    <form>
                        <div class="labell">
                            <label for="email">Email adress</label>
                            <label id="l2" for="email"></label>
                        </div>
                        <!-- Valid Email required -->
                        <input type="text" id="email" placeholder="email@company.com">
                        <button type="submit">Subscribe to monthly newsletter</button>
                    </form>
                </div>
            </div>
            <div class="cont2">
                <img id="desktop-img" src="../assets/images/illustration-sign-up-desktop.svg" alt="">
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
