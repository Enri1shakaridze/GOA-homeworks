<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/onemovie.css">
    <link rel="shortcut icon" href="../image/title.png" type="image/x-icon">
    <title>CINEVERSE</title>
</head>
<body>
    <header>
        <div class="allheader">
            <div class="headername">
                <h1>CINEVERSE</h1>
            </div>
            <div class="navigations">
                <nav>
                    <a href="">Home</a>
                    <a href="">Movies</a>
                    <a href="">Watchlist</a>
                    <a href="">My Account</a>
                </nav>
            </div>
            <div class="seearch">
                <div class="searchimginput">
                    <input type="text" placeholder="seearch movies...">
                    <img width="15px" src="../image/search.webp" alt="">
                </div>
                <div class="profile">
                    <img id="notification" width="80px" src="../image/notifications.png" alt="">
                    <img id="profileimg" width="30px" src="../image/noprofileimg.png" alt="">
                </div>
            </div>
        </div>
    </header>
    <main>
        <section>
            <article>
                <div class="allinfoformovie">
                    <div class="videoimg">
                        <div class="linear">
                            <p>Lenguage</p>
                            <p id="lenguage"></p>
                        </div>
                        <iframe id="movieTrailer" width="960" height="450" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                </div>
            </article>
        </section>
    </main>
    <script src="../js/onemovie.js"></script>
</body>
</html>
