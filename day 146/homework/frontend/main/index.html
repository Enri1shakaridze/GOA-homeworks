<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32x32.png">
    <title>Frontend Mentor | Interactive rating component</title>
</head>
<body>
    <div class="cont">
        <div class="conteiner1">
            <img src="../images/icon-star.svg" alt="">
        </div>
        <div class="conteiner2">
            <h1>How did we do?</h1>
            <p>Please let us know how we did with your support <br> request. All feedback is appreciated to help us <br> improve our offering!</p>
        </div>
        <div class="conteiner3">
            <button id="btn1">1</button>
            <button id="btn2">2</button>
            <button id="btn3">3</button>
            <button id="btn4" style="background-color:hsl(0, 100%, 100%); color: hsl(216, 12%, 8%); ">4</button>
            <button id="btn5" style="background-color: hsl(25, 97%, 53%);">5</button>
        </div>
        <div class="conteiner4">
            <button id="btn6">S U B M I T</button>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
